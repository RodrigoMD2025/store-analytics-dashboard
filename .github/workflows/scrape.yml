name: Client Monitor MD Supabase

on:
  workflow_dispatch:
  repository_dispatch:
    types: [executar_mdonline]

  schedule:
    # Executa 2 min antes da hora cheia a cada 3h, sincronizado com horário de Brasília (BRT = UTC-3)
    # BRT: 23:58, 02:58, 05:58, 08:58, 11:58, 14:58, 17:58, 20:58
    # UTC: 02:58, 05:58, 08:58, 11:58, 14:58, 17:58, 20:58, 23:58
    # Total: 8 execuções por dia (incluindo madrugada)
    - cron: '58 2,5,8,11,14,17,20,23 * * *'

    # Limpeza mensal às 02:00 horário de Brasília
    # 02:00 BRT = 05:00 UTC
    - cron: '0 5 1 * *'

jobs:

  # =====================================================
  # 🏪 MONITORAMENTO DE CLIENTES
  # =====================================================

  monitor-lojas:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 5 1 * *'
    timeout-minutes: 15

    env:
      TZ: America/Sao_Paulo
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      GITHUB_ACTIONS: true
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GERAR_EXCEL: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check System Time
        run: |
          echo "UTC time:"
          date -u
          echo "Local time (Sao Paulo):"
          date

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk-bridge2.0-dev \
            libdrm-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libgbm-dev \
            libxss-dev \
            libasound2-dev

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Verify Supabase connection
        run: |
          python -c "
          import os
          from supabase import create_client
          supabase = create_client(os.getenv('SUPABASE_URL'), os.getenv('SUPABASE_KEY'))
          supabase.table('clientes').select('id').limit(1).execute()
          print('✅ Conexão com Supabase OK')
          "
        working-directory: backend

      - name: Run monitor script
        run: python client_monitor_supabase.py
        working-directory: backend

      - name: Check execution status
        if: always()
        run: |
          if [ -f "log_extracao.log" ]; then
            echo "📊 Últimas linhas do log:"
            tail -20 log_extracao.log
            if grep -q "CRITICAL\|ERROR" log_extracao.log; then
              echo "⚠️ Erros encontrados"
              exit 1
            fi
          else
            echo "❌ Log não encontrado"
            exit 1
          fi
        working-directory: backend

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            backend/log_extracao.log
            backend/relatorio_*.xlsx
          retention-days: 15

      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f relatorio_*.xlsx
          rm -f *.png
        working-directory: backend


  # =====================================================
  # 🧹 LIMPEZA MENSAL DO BANCO
  # =====================================================

  limpeza-banco:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 5 1 * *'
    timeout-minutes: 10

    env:
      TZ: America/Sao_Paulo
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check System Time
        run: |
          echo "UTC time:"
          date -u
          echo "Local time (Sao Paulo):"
          date

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: backend

      - name: Run cleanup script
        run: python cleanup_database.py
        working-directory: backend

      - name: Upload cleanup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-logs-${{ github.run_number }}
          path: |
            backend/limpeza_banco.log
            backend/relatorio_limpeza_banco.json
          retention-days: 30


  # =====================================================
  # 🚨 HEALTH CHECK
  # =====================================================

  health-check:
    runs-on: ubuntu-latest
    needs: [monitor-lojas, limpeza-banco]
    if: always()

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}

    steps:
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$ADMIN_CHAT_ID" \
            -d text="🚨 GitHub Actions - Falha no workflow.
Horário: $(date +'%d/%m/%Y %H:%M:%S UTC')
Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="Markdown"